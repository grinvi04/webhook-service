version: '3.8'
# 배포 이미지: DOCKER_IMAGE 환경변수로 지정. 미설정 시 기본값 사용.

services:
  web:
    # In production, we use a pre-built image from a container registry.
    # Replace this with your actual image name.
    image: ${DOCKER_IMAGE:-ghcr.io/grinvi04/webhook-service:latest}
    ports:
      - "8000:80"
    env_file:
      - .env
    depends_on:
      - redis
      - db
    # Add a restart policy for production
    restart: always

  worker:
    # Use the same pre-built image
    image: ${DOCKER_IMAGE:-ghcr.io/grinvi04/webhook-service:latest}
    command: celery -A app.celery_worker.celery worker --loglevel=info -Q default,dead_letters
    env_file:
      - .env
    depends_on:
      - redis
      - db
    # Add a restart policy for production
    restart: always

  priority-worker:
    # Use the same pre-built image
    image: ${DOCKER_IMAGE:-ghcr.io/grinvi04/webhook-service:latest}
    command: celery -A app.celery_worker.celery worker --loglevel=info -Q high_priority
    env_file:
      - .env
    depends_on:
      - redis
      - db
    # Add a restart policy for production
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Add a restart policy for production
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  prometheus:
    image: prom/prometheus:v2.47.2
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9000:9090"
    depends_on:
      - web
    # Add a restart policy for production
    restart: always

  grafana:
    image: grafana/grafana:10.1.5
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    # Add a restart policy for production
    restart: always

volumes:
  db_data: