# repo-sync — 기존 repo가 team-harness 표준과 sync 됐는지 CI에서 점검하는 스캐폴드.
# 배경: templates/는 신규 셋업에만 적용되고 기존 repo엔 자동 전파되지 않는다. 그래서 표준 게이트가
# 빠진 채 드리프트가 쌓인다(예: test-guard 게이트 누락). 이 워크플로가 team-harness를 checkout해
# check-repo-sync.mjs로 자산(test-guard·commitlint·secret-scan·migration-safety·룰)이 표준과
# sync 됐는지 점검한다. new-repo.sh(신규 셋업)의 대칭 — "기존 repo 점검"을 CI 메커니즘으로 닫는다.
#
# ⚠️ 스캐폴드 — 활성화 전 CUSTOMIZE:
#   1) team-harness ref(@main)를 운영 정책에 맞게 핀 고정 권장(태그/커밋 SHA).
#   2) required check로 강제할지(드리프트 = 머지 차단) 혹은 정보성으로 둘지 결정.
#      MISSING이면 exit 1이라 required로 걸면 표준 게이트가 빠진 PR이 막힌다.
#   3) team-harness가 private면 checkout에 token 필요(아래 주석 참조).
name: repo-sync

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    # env-gate: 변수 미설정이면 잡 자체가 skip(neutral) → 토큰 셋업 전엔 CI를 막지 않는다.
    # 활성화: repo(또는 org) Variables에 HARNESS_SYNC_ENABLED=true + Secrets에 HARNESS_RO_TOKEN(team-harness 읽기 PAT).
    if: ${{ vars.HARNESS_SYNC_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v5  # 대상 repo

      - name: Checkout team-harness (표준 출처)
        uses: actions/checkout@v5
        with:
          repository: grinvi04/team-harness   # CUSTOMIZE: 사내 호스팅 이전 시 교체
          ref: main                            # CUSTOMIZE: 태그/SHA로 핀 고정 권장
          path: .team-harness
          # team-harness가 private면 읽기 토큰 필요(public이면 이 줄 삭제 가능):
          token: ${{ secrets.HARNESS_RO_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check repo ↔ harness sync
        run: node .team-harness/scripts/check-repo-sync.mjs --repo . --harness .team-harness
