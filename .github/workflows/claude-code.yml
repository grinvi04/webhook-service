name: '🤖 Claude Code'

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  claude:
    # PR 리뷰: PR 오픈/동기화 시 자동 실행
    # 이슈 응답: @claude 멘션 시 실행 (OWNER/MEMBER/COLLABORATOR 한정)
    if: |
      (github.event_name == 'pull_request') ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # PR 오픈 시: 코드 리뷰 수행
          # 이슈/댓글에서 @claude 멘션 시: 자유 응답
          allowed_tools: |
            Bash(cat *),
            Bash(grep *),
            Bash(find *),
            Bash(head *),
            Bash(tail *),
            Bash(echo *)
          custom_instructions: |
            이 저장소는 FastAPI + Celery + PostgreSQL + Redis 기반 멀티테넌트 웹훅 처리 서비스입니다.

            PR 리뷰 시 아래 항목을 중점 검토하세요:
            1. HMAC-SHA256 서명 검증 우회 가능성 (hmac.compare_digest 사용 여부)
            2. SQLAlchemy 순환 임포트 위험 (models/__init__.py 에서 직접 import 금지)
            3. Pydantic v2 스키마 정합성
            4. Celery 태스크에서 DB 세션 누수 여부
            5. ruff E501(88자 초과), F401(미사용 import) 위반
            6. Prometheus 메트릭 레이블 일관성

            심각도 표기: 🔴 Critical / 🟠 High / 🟡 Medium / 🟢 Low
            피드백은 한국어로 작성하세요.
