repos:
-   repo: local
    hooks:
    -   id: ruff-check
        name: ruff check
        entry: bash -c 'DYLD_LIBRARY_PATH=/opt/homebrew/opt/expat/lib .venv/bin/ruff check --fix app/ tests/'
        language: system
        pass_filenames: false
        always_run: true

    -   id: ruff-format
        name: ruff format
        entry: bash -c 'DYLD_LIBRARY_PATH=/opt/homebrew/opt/expat/lib .venv/bin/ruff format app/ tests/'
        language: system
        pass_filenames: false
        always_run: true

    -   id: mypy
        name: mypy
        entry: bash -c 'DYLD_LIBRARY_PATH=/opt/homebrew/opt/expat/lib .venv/bin/mypy'
        language: system
        pass_filenames: false
        always_run: true

    -   id: pytest
        name: pytest
        entry: bash -c 'DYLD_LIBRARY_PATH=/opt/homebrew/opt/expat/lib DATABASE_URL=postgresql+psycopg2://user:password@localhost:5433/webhook_db .venv/bin/pytest tests/ -q --tb=short'
        language: system
        pass_filenames: false
        always_run: true
